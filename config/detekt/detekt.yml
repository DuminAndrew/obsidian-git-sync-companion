build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console-reports:
  active: true

comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    # The sync orchestration functions thread API client, vault, repo coordinates
    # and several SHA states; 12 keeps them readable without forcing a wrapper type.
    functionThreshold: 12
    constructorThreshold: 9
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInFiles: 20
    thresholdInObjects: 20
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  NestedBlockDepth:
    active: true
    threshold: 5

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: false

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true

performance:
  active: true
  SpreadOperator:
    active: false

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
  ForbiddenComment:
    active: false
  ReturnCount:
    active: true
    max: 6
  UnusedPrivateMember:
    active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  FunctionOnlyReturningConstant:
    active: false
  DataClassContainsFunctions:
    active: false
  UseDataClass:
    active: false
