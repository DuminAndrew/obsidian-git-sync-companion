name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Installs Gradle 8.9 (matching gradle-wrapper.properties) on PATH and
      # enables build/dependency caching. The build runs via this `gradle`
      # directly, since gradle-wrapper.jar is not committed.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      # Single invocation with --continue so ktlint, detekt, unit tests and the
      # debug assembly all report their findings in one run.
      - name: Lint, test & assemble
        run: gradle ktlintCheck detekt testDebugUnitTest assembleDebug --continue --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-lint-reports
          path: |
            app/build/reports/tests/
            app/build/reports/ktlint/
            app/build/reports/detekt/
          if-no-files-found: ignore

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
